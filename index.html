<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Portfolio Gallery</title>
  <link rel="stylesheet" href="./style.css" />

  <!-- Import map: lets us write `import * as THREE from 'three'` with no build step.
       GitHub Pages serves the page over HTTPS, the CDN serves Three.js — that's it. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- ============ TITLE MENU ============ -->
  <!-- This sits on top of everything until the user presses Start.
       Loading happens in the background; the Start button is disabled
       until the LoadingManager reports 100%. -->
  <div id="menu" class="overlay">
    <div class="menu-inner">
      <!-- Drop a title image at ./assets/title.png to replace the text. -->
      <img id="title-image" class="title-image"
           src="./assets/title.png" alt=""
           onerror="this.style.display='none'; document.getElementById('title-fallback').style.display='block';" />
      <h1 id="title-fallback" class="title" style="display:none;">YOUR&nbsp;NAME</h1>
      <p class="subtitle">An interactive portfolio</p>

      <div class="loading">
        <div class="bar"><div id="progress-bar"></div></div>
        <div id="progress-text">Loading… 0%</div>
      </div>

      <button id="start-button" class="btn" disabled>Start</button>
      <p class="hint">Press <kbd>Enter</kbd> or click Start</p>

      <div class="controls-hint">
        <div>
          <strong>WASD</strong> move &nbsp;·&nbsp;
          <strong>Mouse</strong> look &nbsp;·&nbsp;
          <strong>Space</strong> jump &nbsp;·&nbsp;
          <strong>Shift</strong> sneak &nbsp;·&nbsp;
          <strong>Q</strong> sprint
        </div>
        <div style="margin-top:0.4rem;">
          <strong>E</strong> interact &nbsp;·&nbsp;
          <strong>I</strong> inventory &nbsp;·&nbsp;
          <strong>Esc</strong> pause
        </div>
      </div>
    </div>
  </div>

  <!-- ============ 3D SCENE ============ -->
  <canvas id="scene"></canvas>

  <!-- ============ HUD ============ -->
  <div id="hud" class="hidden">
    <div id="crosshair"></div>
    <div id="prompt" class="hidden"></div>
  </div>

  <!-- ============ RESUME OVERLAY ============ -->
  <!-- Shown when pointer lock is released (after closing a modal, or
       if the user pressed Escape mid-game). A click re-acquires lock. -->
  <div id="resume-overlay" class="overlay hidden">
    <div class="menu-inner">
      <p class="subtitle">Paused</p>
      <button id="resume-button" class="btn">Click to resume</button>
      <p class="hint">or press <kbd>Esc</kbd></p>

      <div class="volume-row">
        <label for="volume-slider">Volume</label>
        <input id="volume-slider" type="range" min="0" max="100" value="70" />
      </div>
    </div>
  </div>

  <!-- ============ ARTWORK MODAL ============ -->
  <!-- Opens when player presses E on an interactable. Pointer lock releases
       so the user can read / click. Closing returns to the scene. -->
  <div id="artwork-modal" class="overlay hidden">
    <div class="modal-card">
      <button id="modal-close" class="modal-close" aria-label="Close">×</button>
      <div id="modal-media"></div>
      <h2 id="modal-title"></h2>
      <p id="modal-description"></p>
    </div>
  </div>

  <!-- ============ INVENTORY OVERLAY ============ -->
  <div id="inventory-overlay" class="overlay hidden">
    <div class="menu-inner inventory-card">
      <h2 class="inv-title">INVENTORY</h2>
      <div id="inventory-grid" class="inventory-grid"></div>
      <div id="inventory-detail" class="inventory-detail">
        <p class="hint">Select an item to view its description.</p>
      </div>
      <p class="hint">Press <kbd>I</kbd> to close</p>
    </div>
  </div>

  <!-- ============ TOAST (pickup notifications) ============ -->
  <div id="toast" class="hidden"></div>

  <!-- ============ MOBILE TOUCH CONTROLS ============ -->
  <!-- Hidden by default; shown when a touch device is detected. -->
  <div id="touch-ui" class="hidden">
    <div id="joystick">
      <div id="joystick-knob"></div>
    </div>
    <button id="touch-interact" aria-label="Interact">E</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>

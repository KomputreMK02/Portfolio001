<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Portfolio</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="start-menu-body">

  <!-- ============ VIDEO BACKDROP ============ -->
  <!-- Drop a short looping clip at ./assets/menu/backdrop.mp4 to enable.
       Without one the page just falls back to a solid dark background. -->
  <video id="menu-backdrop" autoplay muted loop playsinline>
    <source src="./assets/menu/backdrop.mp4" type="video/mp4" />
  </video>

  <!-- ============ START MENU ============ -->
  <div id="start-menu" class="start-menu">

    <!-- Title image: drop ./assets/title.png to override the text fallback. -->
    <img id="start-title-image" class="start-title-image"
         src="./assets/title.png" alt="Portfolio"
         onerror="this.style.display='none'; document.getElementById('start-title-fallback').style.display='block';" />
    <h1 id="start-title-fallback" class="start-title-fallback" style="display:none;">PORTFOLIO</h1>

    <!-- Main menu (default panel) -->
    <nav id="main-menu" class="menu-nav">
      <ul>
        <li tabindex="0" data-action="new-game">New Game</li>
        <li tabindex="0" data-action="level-select">Level Select</li>
        <li tabindex="0" data-action="settings">Settings</li>
      </ul>
    </nav>

    <!-- Level Select panel (hidden by default) -->
    <div id="level-select" class="menu-panel hidden">
      <h2 class="panel-title">Select Level</h2>
      <ul class="panel-list" id="level-list">
        <!-- populated from levels.js -->
      </ul>
      <button class="panel-back" tabindex="0" data-action="back">Back</button>
    </div>

    <!-- Settings panel (hidden by default) -->
    <div id="settings-panel" class="menu-panel hidden">
      <h2 class="panel-title">Settings</h2>
      <div class="settings-row">
        <label for="menu-volume">Volume</label>
        <input id="menu-volume" type="range" min="0" max="100" value="70" />
      </div>
      <button class="panel-back" tabindex="0" data-action="back">Back</button>
    </div>
  </div>

  <script type="module" src="./menu.js"></script>
</body>
</html>
